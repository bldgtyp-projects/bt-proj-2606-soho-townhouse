name: CI

# Per-project CI delegates everything to the reusable workflow in the
# template repo. Editing the build pipeline happens in ONE place:
# bldgtyp/bt-web-report-template/.github/workflows/_renderer-build.yml
#
# Refs MUST be explicit SHAs (or tags). Floating `main` is rejected by
# `btwr new` / `btwr pin` because it causes cross-project cascade
# redeploys when the template changes. `btwr new` substitutes the SHAs
# below at seed time; `btwr pin` rewrites them when the project intentionally
# advances to a newer template revision.
#
# Schemas comes from the public npm registry (@bldgtyp/web-report-schemas);
# no auth token required for the dependency fetch.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    uses: bldgtyp/bt-web-report-template/.github/workflows/_renderer-build.yml@bd1964b069f876238cb18e434734d1f5dff8ca13
    with:
      project-repo: ${{ github.repository }}
      project-ref: ${{ github.ref }}
      renderer-ref: bd1964b069f876238cb18e434734d1f5dff8ca13
      schemas-ref: 4bc0d2f4d584bf0bbeaffa743ad1e3fb7a62286d
      run-deploy: false
